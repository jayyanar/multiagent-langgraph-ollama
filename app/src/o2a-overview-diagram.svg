<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3000 2000" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f9fbff"/>
      <stop offset="1" stop-color="#eef3fb"/>
    </linearGradient>
    <linearGradient id="extG" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#6b7388"/><stop offset="1" stop-color="#3d4456"/>
    </linearGradient>
    <linearGradient id="ddaasG" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#2c5fb8"/><stop offset="1" stop-color="#14306b"/>
    </linearGradient>
    <linearGradient id="trG" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1f8d5b"/><stop offset="1" stop-color="#0c3f29"/>
    </linearGradient>
    <linearGradient id="vaultG" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#c14444"/><stop offset="1" stop-color="#7d1f1f"/>
    </linearGradient>
    <linearGradient id="dsG" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#7e5cc6"/><stop offset="1" stop-color="#4d2f8c"/>
    </linearGradient>
    <linearGradient id="scopeG" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#f6f9ff"/><stop offset="1" stop-color="#e3ecf8"/>
    </linearGradient>
    <linearGradient id="titleG" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#0c1c3a"/><stop offset="1" stop-color="#1f4ea6"/>
    </linearGradient>

    <marker id="bigArr" viewBox="0 0 14 14" refX="13" refY="7" markerWidth="13" markerHeight="13" orient="auto-start-reverse">
      <path d="M0,0 L14,7 L0,14 z" fill="#2a3144"/>
    </marker>
    <marker id="bigArrBlue" viewBox="0 0 14 14" refX="13" refY="7" markerWidth="13" markerHeight="13" orient="auto-start-reverse">
      <path d="M0,0 L14,7 L0,14 z" fill="#1f4ea6"/>
    </marker>
    <marker id="bigArrGreen" viewBox="0 0 14 14" refX="13" refY="7" markerWidth="13" markerHeight="13" orient="auto-start-reverse">
      <path d="M0,0 L14,7 L0,14 z" fill="#14704a"/>
    </marker>
    <marker id="bigArrPurple" viewBox="0 0 14 14" refX="13" refY="7" markerWidth="13" markerHeight="13" orient="auto-start-reverse">
      <path d="M0,0 L14,7 L0,14 z" fill="#4d2f8c"/>
    </marker>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feOffset in="b" dy="5" result="o"/>
      <feComponentTransfer in="o" result="o2"><feFuncA type="linear" slope="0.25"/></feComponentTransfer>
      <feMerge><feMergeNode in="o2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="3000" height="2000" fill="url(#bgGrad)"/>

  <!-- TITLE BAR -->
  <rect x="0" y="0" width="3000" height="200" fill="url(#titleG)"/>
  <text x="120" y="80" fill="#cfdbf2" font-size="24" font-weight="700" letter-spacing="3">EXECUTIVE OVERVIEW</text>
  <text x="120" y="148" fill="#ffffff" font-size="62" font-weight="800" letter-spacing="-1">Project O2A — Observe to Agent</text>
  <text x="120" y="186" fill="#cfdbf2" font-size="24">From human SOP capture to autonomous, data-aware agents running at enterprise scale</text>

  <!-- KPI STRIP -->
  <g transform="translate(120, 240)">
    <rect width="2760" height="120" rx="16" fill="#ffffff" stroke="#dbe2ec" stroke-width="2"/>
    <g font-family="-apple-system, sans-serif" text-anchor="middle">
      <text x="345" y="65" fill="#1a1f2e" font-size="42" font-weight="800">1,000+</text>
      <text x="345" y="100" fill="#6b7388" font-size="20">concurrent agent runs</text>
      <line x1="690" y1="30" x2="690" y2="90" stroke="#dbe2ec" stroke-width="2"/>
      <text x="1035" y="65" fill="#1a1f2e" font-size="42" font-weight="800">50K+</text>
      <text x="1035" y="100" fill="#6b7388" font-size="20">catalogued data objects</text>
      <line x1="1380" y1="30" x2="1380" y2="90" stroke="#dbe2ec" stroke-width="2"/>
      <text x="1725" y="65" fill="#1a1f2e" font-size="42" font-weight="800">100s</text>
      <text x="1725" y="100" fill="#6b7388" font-size="20">sources unified</text>
      <line x1="2070" y1="30" x2="2070" y2="90" stroke="#dbe2ec" stroke-width="2"/>
      <text x="2415" y="65" fill="#1a1f2e" font-size="42" font-weight="800">1 year</text>
      <text x="2415" y="100" fill="#6b7388" font-size="20">audit trail retention</text>
    </g>
  </g>

  <!-- PLATFORM SCOPE BACKGROUND BOX -->
  <g>
    <rect x="700" y="560" width="1620" height="640" rx="28" fill="url(#scopeG)" stroke="#1f4ea6" stroke-dasharray="14 8" stroke-width="3"/>
    <text x="1510" y="610" text-anchor="middle" fill="#1f4ea6" font-size="22" font-weight="800" letter-spacing="3">PLATFORM SCOPE — TWO SERVICES OWNED BY THIS DESIGN</text>
  </g>

  <!-- ============== STAGE 1: SKAN.AI ============== -->
  <g filter="url(#shadow)">
    <rect x="120" y="430" width="380" height="220" rx="20" fill="url(#extG)"/>
    <text x="310" y="500" text-anchor="middle" fill="#ffffff" font-size="32" font-weight="800">SKAN.ai</text>
    <line x1="160" y1="520" x2="460" y2="520" stroke="#d8def0" stroke-opacity="0.35" stroke-width="2"/>
    <text x="310" y="560" text-anchor="middle" fill="#d8def0" font-size="20">Records human SOP execution</text>
    <text x="310" y="590" text-anchor="middle" fill="#d8def0" font-size="20">across business lines</text>
    <text x="310" y="630" text-anchor="middle" fill="#a8b1c5" font-size="18" font-style="italic">Upstream — not in scope</text>
  </g>

  <!-- ============== STAGE 2: INGESTION PIPELINE ============== -->
  <g filter="url(#shadow)">
    <rect x="120" y="820" width="500" height="320" rx="20" fill="url(#extG)"/>
    <text x="370" y="890" text-anchor="middle" fill="#ffffff" font-size="32" font-weight="800">Ingestion Pipeline</text>
    <line x1="160" y1="910" x2="580" y2="910" stroke="#d8def0" stroke-opacity="0.35" stroke-width="2"/>
    <text x="370" y="952" text-anchor="middle" fill="#d8def0" font-size="20">Turns SKAN traces + SOP docs</text>
    <text x="370" y="984" text-anchor="middle" fill="#d8def0" font-size="20">into procedural SKILL.md</text>
    <g font-size="20" fill="#e7eef9">
      <text x="160" y="1030">• Option A: pure SKILL.md</text>
      <text x="160" y="1062">• Option B: + Python with</text>
      <text x="160" y="1090">  placeholders for Tools</text>
    </g>
    <text x="370" y="1124" text-anchor="middle" fill="#a8b1c5" font-size="18" font-style="italic">Upstream — not in scope</text>
  </g>

  <!-- ============== DDAAS BIG BOX ============== -->
  <g filter="url(#shadow)">
    <rect x="760" y="660" width="700" height="440" rx="22" fill="url(#ddaasG)"/>
    <text x="1110" y="730" text-anchor="middle" fill="#ffffff" font-size="42" font-weight="800">Data Dictionary</text>
    <text x="1110" y="780" text-anchor="middle" fill="#ffffff" font-size="42" font-weight="800">as a Service (DDaaS)</text>
    <text x="1110" y="820" text-anchor="middle" fill="#cfdbf2" font-size="22">The catalog of meaning</text>
    <line x1="800" y1="850" x2="1420" y2="850" stroke="#cfdbf2" stroke-opacity="0.35" stroke-width="2"/>
    <text x="1110" y="890" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="800">ddaas-api · ddaas-profiler · ddaas-enricher</text>
    <g font-size="22" fill="#e7eef9">
      <text x="800" y="940">• Source onboarding + Vault</text>
      <text x="800" y="976">• Kafka-driven profiling (100-row sample)</text>
      <text x="800" y="1012">• LLM enrichment — semantics, glossary, joins</text>
      <text x="800" y="1048">• REST + MCP catalog surface</text>
      <text x="800" y="1084">• Steward approval workflow</text>
    </g>
  </g>

  <!-- ============== TOOL REGISTRY BIG BOX ============== -->
  <g filter="url(#shadow)">
    <rect x="1560" y="660" width="700" height="440" rx="22" fill="url(#trG)"/>
    <text x="1910" y="730" text-anchor="middle" fill="#ffffff" font-size="42" font-weight="800">Tool Registry</text>
    <text x="1910" y="780" text-anchor="middle" fill="#ffffff" font-size="42" font-weight="800">(execution)</text>
    <text x="1910" y="820" text-anchor="middle" fill="#d5ecdc" font-size="22">The execution layer</text>
    <line x1="1600" y1="850" x2="2220" y2="850" stroke="#d5ecdc" stroke-opacity="0.35" stroke-width="2"/>
    <text x="1910" y="890" text-anchor="middle" fill="#ffffff" font-size="22" font-weight="800">toolreg-router · toolreg-async-cb · toolreg-scheduler</text>
    <g font-size="22" fill="#e9f5ee">
      <text x="1600" y="940">• Pooled connections per source</text>
      <text x="1600" y="976">• Sync + async API patterns</text>
      <text x="1600" y="1012">• Quotas · timeouts · circuit breakers</text>
      <text x="1600" y="1048">• Full audit · OpenTelemetry</text>
      <text x="1600" y="1084">• Pool SPI (UCP / DBCP2 / Hikari)</text>
    </g>
  </g>

  <!-- DDaaS ↔ TR exchange labels -->
  <path d="M1460,830 L1560,830" stroke="#2a3144" stroke-width="5" marker-end="url(#bigArr)" fill="none"/>
  <text x="1510" y="815" text-anchor="middle" fill="#2a3144" font-size="20" font-weight="800">sampleRows()</text>

  <path d="M1560,910 L1460,910" stroke="#2a3144" stroke-width="5" marker-end="url(#bigArr)" fill="none"/>
  <text x="1510" y="935" text-anchor="middle" fill="#2a3144" font-size="20" font-weight="800">tool_def</text>

  <!-- VAULT under platform scope -->
  <g filter="url(#shadow)">
    <rect x="1280" y="1130" width="460" height="100" rx="14" fill="url(#vaultG)"/>
    <text x="1510" y="1185" text-anchor="middle" fill="#ffffff" font-size="30" font-weight="800">Vault</text>
    <text x="1510" y="1213" text-anchor="middle" fill="#f7d9d9" font-size="20">shared secret store · DDaaS writes · Tool Registry reads</text>
  </g>
  <path d="M1110,1100 L1380,1130" stroke="#8e2424" stroke-width="3" stroke-dasharray="8 5" fill="none"/>
  <path d="M1910,1100 L1640,1130" stroke="#8e2424" stroke-width="3" stroke-dasharray="8 5" fill="none"/>

  <!-- ============== STAGE 4: GOOGLE ADK ============== -->
  <g filter="url(#shadow)">
    <rect x="2380" y="820" width="500" height="320" rx="20" fill="url(#extG)"/>
    <text x="2630" y="890" text-anchor="middle" fill="#ffffff" font-size="32" font-weight="800">Google ADK</text>
    <text x="2630" y="930" text-anchor="middle" fill="#d8def0" font-size="24">Agent Runtime</text>
    <line x1="2420" y1="950" x2="2840" y2="950" stroke="#d8def0" stroke-opacity="0.35" stroke-width="2"/>
    <text x="2630" y="992" text-anchor="middle" fill="#d8def0" font-size="20">Runs SKILL.md as autonomous</text>
    <text x="2630" y="1024" text-anchor="middle" fill="#d8def0" font-size="20">agents at scale</text>
    <g font-size="20" fill="#e7eef9">
      <text x="2420" y="1062">• Reads describe() via MCP</text>
      <text x="2420" y="1094">• Calls execute() per step</text>
    </g>
    <text x="2630" y="1124" text-anchor="middle" fill="#a8b1c5" font-size="18" font-style="italic">Downstream — not in scope</text>
  </g>

  <!-- ============== STAGE 5: ENTERPRISE DATA SOURCES ============== -->
  <g filter="url(#shadow)">
    <rect x="2380" y="430" width="500" height="360" rx="20" fill="url(#dsG)"/>
    <text x="2630" y="500" text-anchor="middle" fill="#ffffff" font-size="32" font-weight="800">Enterprise Data Sources</text>
    <text x="2630" y="540" text-anchor="middle" fill="#e3dbf2" font-size="20">Touched only by Tool Registry</text>
    <line x1="2420" y1="560" x2="2840" y2="560" stroke="#e3dbf2" stroke-opacity="0.35" stroke-width="2"/>
    <g font-size="22" fill="#f1ecfa">
      <text x="2630" y="610" text-anchor="middle">Oracle · MS SQL · Teradata</text>
      <text x="2630" y="650" text-anchor="middle">Postgres · MySQL · MongoDB</text>
      <text x="2630" y="690" text-anchor="middle">S3 (parquet / csv / json)</text>
      <text x="2630" y="730" text-anchor="middle">External APIs (sync &amp; async)</text>
    </g>
    <text x="2630" y="772" text-anchor="middle" fill="#e3dbf2" font-size="18" font-style="italic">Federated, not replaced</text>
  </g>

  <!-- ============ NUMBERED FLOW ARROWS ============ -->
  <!-- 1. SKAN → Ingestion -->
  <path d="M310,650 L370,820" stroke="#2a3144" stroke-width="6" marker-end="url(#bigArr)" fill="none"/>
  <g>
    <circle cx="270" cy="735" r="28" fill="#2a3144"/>
    <text x="270" y="745" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="800">1</text>
  </g>
  <text x="180" y="780" fill="#2a3144" font-size="22" font-weight="800">traces + SOP</text>

  <!-- 2. Ingestion → DDaaS (search & describe) -->
  <path d="M620,940 L760,890" stroke="#1f4ea6" stroke-width="6" marker-end="url(#bigArrBlue)" fill="none"/>
  <g>
    <circle cx="680" cy="880" r="28" fill="#1f4ea6"/>
    <text x="680" y="890" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="800">2</text>
  </g>
  <text x="640" y="850" fill="#1f4ea6" font-size="22" font-weight="800">search · describe</text>

  <path d="M760,990 L620,1030" stroke="#1f4ea6" stroke-width="6" stroke-dasharray="10 6" marker-end="url(#bigArrBlue)" fill="none"/>
  <text x="630" y="1070" fill="#1f4ea6" font-size="22" font-weight="800">data-aware Tools returned</text>

  <!-- 3. Ingestion → ADK (handoff) -->
  <path d="M620,860 C1200,300 2000,300 2630,820" stroke="#2a3144" stroke-width="6" stroke-dasharray="14 8" marker-end="url(#bigArr)" fill="none"/>
  <g>
    <circle cx="1500" cy="395" r="28" fill="#2a3144"/>
    <text x="1500" y="405" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="800">3</text>
  </g>
  <text x="1500" y="370" text-anchor="middle" fill="#2a3144" font-size="22" font-weight="800">hand off data-aware SKILL.md to ADK</text>

  <!-- 4. ADK → Tool Registry (execute) -->
  <path d="M2380,920 L2260,890" stroke="#14704a" stroke-width="6" marker-end="url(#bigArrGreen)" fill="none"/>
  <g>
    <circle cx="2310" cy="850" r="28" fill="#14704a"/>
    <text x="2310" y="860" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="800">4</text>
  </g>
  <text x="2310" y="820" text-anchor="middle" fill="#14704a" font-size="22" font-weight="800">execute</text>

  <path d="M2260,960 L2380,990" stroke="#14704a" stroke-width="6" stroke-dasharray="10 6" marker-end="url(#bigArrGreen)" fill="none"/>
  <text x="2310" y="1020" text-anchor="middle" fill="#14704a" font-size="22" font-weight="800">result / trace</text>

  <!-- 5. Tool Registry → Sources -->
  <path d="M2260,750 L2380,610" stroke="#14704a" stroke-width="6" marker-end="url(#bigArrGreen)" fill="none"/>
  <g>
    <circle cx="2360" cy="700" r="28" fill="#14704a"/>
    <text x="2360" y="710" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="800">5</text>
  </g>
  <text x="2310" y="660" text-anchor="middle" fill="#14704a" font-size="22" font-weight="800">query · sample · API call</text>

  <!-- ============ OUTCOMES STRIP (y=1290) ============ -->
  <g filter="url(#shadow)">
    <rect x="120" y="1290" width="2760" height="380" rx="22" fill="#ffffff" stroke="#dbe2ec" stroke-width="2"/>
    <text x="1500" y="1360" text-anchor="middle" fill="#1a1f2e" font-size="36" font-weight="800">What these two platform services unlock</text>

    <g transform="translate(160, 1410)">
      <rect width="820" height="220" rx="16" fill="#eaf0fb" stroke="#1f4ea6" stroke-width="2"/>
      <text x="40" y="60" fill="#1f4ea6" font-size="22" font-weight="800" letter-spacing="1">DATA-AWARE BY CONSTRUCTION</text>
      <line x1="40" y1="78" x2="780" y2="78" stroke="#cfdbf2" stroke-width="2"/>
      <g font-size="22" fill="#1a1f2e">
        <text x="40" y="125">Every SKILL.md is bound to real</text>
        <text x="40" y="160">Tools at build time. Agents stop</text>
        <text x="40" y="195">guessing tables, columns, or APIs.</text>
      </g>
    </g>

    <g transform="translate(1090, 1410)">
      <rect width="820" height="220" rx="16" fill="#e3f3ea" stroke="#14704a" stroke-width="2"/>
      <text x="40" y="60" fill="#14704a" font-size="22" font-weight="800" letter-spacing="1">CONNECTIONS SCALE TO THOUSANDS</text>
      <line x1="40" y1="78" x2="780" y2="78" stroke="#cce5d6" stroke-width="2"/>
      <g font-size="22" fill="#1a1f2e">
        <text x="40" y="125">Pooled, governed, audited.</text>
        <text x="40" y="160">1,000 agents share 80 connections,</text>
        <text x="40" y="195">not 1,000. Sources stay safe.</text>
      </g>
    </g>

    <g transform="translate(2020, 1410)">
      <rect width="820" height="220" rx="16" fill="#fbe9e9" stroke="#8e2424" stroke-width="2"/>
      <text x="40" y="60" fill="#8e2424" font-size="22" font-weight="800" letter-spacing="1">CREDENTIALS IN ONE PLACE</text>
      <line x1="40" y1="78" x2="780" y2="78" stroke="#f1cccc" stroke-width="2"/>
      <g font-size="22" fill="#1a1f2e">
        <text x="40" y="125">Vault is the only place a</text>
        <text x="40" y="160">password lives. Rotation is a</text>
        <text x="40" y="195">Vault operation, not an outage.</text>
      </g>
    </g>
  </g>

  <!-- ============ BOTTOM TAGLINE ============ -->
  <g>
    <rect x="120" y="1720" width="2760" height="120" rx="22" fill="url(#titleG)"/>
    <text x="1500" y="1785" text-anchor="middle" fill="#ffffff" font-size="28" font-weight="700" font-style="italic">Once a source is onboarded, every future agent inherits it for free.</text>
    <text x="1500" y="1820" text-anchor="middle" fill="#cfdbf2" font-size="22">The marginal cost of the next automation falls — the working definition of platform leverage.</text>
  </g>

  <!-- FOOTER -->
  <text x="1500" y="1950" text-anchor="middle" fill="#6b7388" font-size="20">Project O2A · Executive Overview v0.1 · Five hand-offs · Two platform services · One audit choke point</text>

</svg>
